services:
  # ==================== 基础设施 ====================

  mysql:
    image: mysql:8.0
    container_name: knowbrain-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-knowbrain123}
      MYSQL_DATABASE: knowbrain
      MYSQL_CHARSET: utf8mb4
      MYSQL_COLLATION: utf8mb4_unicode_ci
      TZ: Asia/Shanghai
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./knowbrain-server/docker/mysql/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "MYSQL_PWD=$${MYSQL_ROOT_PASSWORD} mysqladmin ping -h localhost -u root"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - knowbrain-net

  redis:
    image: redis:7-alpine
    container_name: knowbrain-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-knowbrain_redis_2024} --appendonly yes
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD-SHELL", "REDISCLI_AUTH=$${REDIS_PASSWORD} redis-cli ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - knowbrain-net

  minio:
    image: minio/minio:latest
    container_name: knowbrain-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
      TZ: Asia/Shanghai
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - knowbrain-net

  # MinIO 初始化：创建 knowbrain-documents bucket
  minio-init:
    image: minio/mc:latest
    container_name: knowbrain-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${MINIO_ACCESS_KEY:-minioadmin} ${MINIO_SECRET_KEY:-minioadmin};
      mc mb --ignore-existing local/${MINIO_BUCKET:-knowbrain-documents};
      echo 'MinIO bucket ready.';
      exit 0;
      "
    networks:
      - knowbrain-net

  milvus:
    image: milvusdb/milvus:v2.4.0
    container_name: knowbrain-milvus
    restart: unless-stopped
    command: ["milvus", "run", "standalone"]
    environment:
      # 启用嵌入式 etcd（关键！否则会尝试连外部 etcd）
      ETCD_USE_EMBED: "true"
      ETCD_DATA_DIR: /var/lib/milvus/etcd
      # 使用本地存储（不使用外部 MinIO/S3）
      COMMON_STORAGETYPE: local
      TZ: Asia/Shanghai
    ports:
      - "${MILVUS_GRPC_PORT:-19530}:19530"
      - "${MILVUS_METRIC_PORT:-9091}:9091"
    volumes:
      - milvus-data:/var/lib/milvus
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9091/healthz"]
      interval: 30s
      timeout: 10s
      retries: 10
    networks:
      - knowbrain-net

  # ==================== 应用服务 ====================

  server:
    build:
      context: ./knowbrain-server
      dockerfile: Dockerfile
    image: knowbrain-server:latest
    container_name: knowbrain-server
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      milvus:
        condition: service_healthy
    environment:
      # MySQL
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_DATABASE: knowbrain
      MYSQL_USERNAME: root
      MYSQL_PASSWORD: ${MYSQL_ROOT_PASSWORD:-knowbrain123}
      # Redis
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-knowbrain_redis_2024}
      # MinIO
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
      MINIO_BUCKET: ${MINIO_BUCKET:-knowbrain-documents}
      # Milvus
      MILVUS_HOST: milvus
      MILVUS_GRPC_PORT: 19530
      MILVUS_USERNAME: ${MILVUS_USERNAME:-}
      MILVUS_PASSWORD: ${MILVUS_PASSWORD:-}
      MILVUS_RECREATE_ON_STARTUP: ${MILVUS_RECREATE_ON_STARTUP:-false}
      MILVUS_COLLECTION: ${MILVUS_COLLECTION:-knowbrain_knowledge_base}
      # RAG Agent（默认关闭，生产环境渐进式上线）
      RAG_AGENT_ENABLED: ${RAG_AGENT_ENABLED:-false}
      # Spring profile（生产环境）
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-prod}
      # LLM
      SPRING_AI_OPENAI_API_KEY: ${SPRING_AI_OPENAI_API_KEY:-}
      SPRING_AI_OPENAI_BASE_URL: ${SPRING_AI_OPENAI_BASE_URL:-https://dashscope.aliyuncs.com/compatible-mode}
      SPRING_AI_OPENAI_CHAT_MODEL: ${SPRING_AI_OPENAI_CHAT_MODEL:-qwen-max}
      SPRING_AI_OPENAI_EMBEDDING_MODEL: ${SPRING_AI_OPENAI_EMBEDDING_MODEL:-text-embedding-v4}
      # JWT
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      JWT_EXPIRE_HOURS: ${JWT_EXPIRE_HOURS:-24}
      # CORS
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost}
      # 企业微信 Bot
      WECOM_ENABLED: ${WECOM_ENABLED:-false}
      WECOM_CORP_ID: ${WECOM_CORP_ID:-}
      WECOM_AGENT_ID: ${WECOM_AGENT_ID:-}
      WECOM_SECRET: ${WECOM_SECRET:-}
      WECOM_TOKEN: ${WECOM_TOKEN:-}
      WECOM_ENCODING_AES_KEY: ${WECOM_ENCODING_AES_KEY:-}
      # 钉钉 Bot
      DINGTALK_ENABLED: ${DINGTALK_ENABLED:-false}
      DINGTALK_APP_KEY: ${DINGTALK_APP_KEY:-}
      DINGTALK_APP_SECRET: ${DINGTALK_APP_SECRET:-}
      DINGTALK_ROBOT_CODE: ${DINGTALK_ROBOT_CODE:-}
      # 飞书 Bot（IM_FEISHU_* 直接映射到 Spring im.feishu.*，绕过 application.yml 占位符解析时序问题）
      FEISHU_ENABLED: ${FEISHU_ENABLED:-false}
      FEISHU_APP_ID: ${FEISHU_APP_ID:-}
      FEISHU_APP_SECRET: ${FEISHU_APP_SECRET:-}
      IM_FEISHU_ENABLED: ${FEISHU_ENABLED:-false}
      IM_FEISHU_APP_ID: ${FEISHU_APP_ID:-}
      IM_FEISHU_APP_SECRET: ${FEISHU_APP_SECRET:-}
      # RAG 评测 — Judge 模型配置（不配置则复用主 ChatClient）
      EVAL_JUDGE_BASE_URL: ${EVAL_JUDGE_BASE_URL:-}
      EVAL_JUDGE_API_KEY: ${EVAL_JUDGE_API_KEY:-}
      EVAL_JUDGE_MODEL: ${EVAL_JUDGE_MODEL:-}
      # MyBatis（生产环境关闭 SQL 日志）
      MYBATIS_LOG_IMPL: org.apache.ibatis.logging.nologging.NoLoggingImpl
      # JVM
      JAVA_OPTS: "-Xms256m -Xmx512m -XX:+UseG1GC -Dfile.encoding=UTF-8"
      TZ: Asia/Shanghai
    ports:
      - "${SERVER_PORT:-8080}:8080"
    networks:
      - knowbrain-net

  web:
    build:
      context: ./knowbrain-web
      dockerfile: Dockerfile
    image: knowbrain-web:latest
    container_name: knowbrain-web
    restart: unless-stopped
    depends_on:
      - server
    networks:
      - knowbrain-net

  # ==================== 网关 ====================

  nginx:
    image: nginx:alpine
    container_name: knowbrain-nginx
    restart: unless-stopped
    depends_on:
      - server
      - web
    ports:
      - "${NGINX_PORT:-80}:80"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - knowbrain-net

  # ==================== 监控（默认关闭） ====================

  prometheus:
    image: prom/prometheus:latest
    container_name: knowbrain-prometheus
    restart: unless-stopped
    profiles:
      - monitoring
    volumes:
      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    networks:
      - knowbrain-net

  grafana:
    image: grafana/grafana:latest
    container_name: knowbrain-grafana
    restart: unless-stopped
    profiles:
      - monitoring
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_INSTALL_PLUGINS: ""
    volumes:
      - ./docker/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./docker/grafana/datasources.yml:/etc/grafana/provisioning/datasources/datasources.yml:ro
      - grafana-data:/var/lib/grafana
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    networks:
      - knowbrain-net

# ==================== 数据卷 ====================

volumes:
  mysql-data:
  redis-data:
  minio-data:
  milvus-data:
  prometheus-data:
  grafana-data:

# ==================== 网络 ====================

networks:
  knowbrain-net:
    driver: bridge
