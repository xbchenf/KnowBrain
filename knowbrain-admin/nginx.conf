server {
    listen       80;
    server_name  localhost;

    root   /usr/share/nginx/html;
    index  index.html;

    # /admin/* → 去掉前缀后重新匹配
    location /admin {
        rewrite ^/admin/?(.*)$ /$1 last;
    }

    # SPA History 模式 fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 静态资源缓存
    location /assets/ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}
