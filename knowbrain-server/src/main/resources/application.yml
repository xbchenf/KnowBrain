server:
  port: 8080
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true

# CORS 跨域配置
cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost}

spring:
  # 默认激活 dev 环境（本地开发）
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  # Flyway 数据库迁移（首次部署由 Docker init 建表，Flyway 负责后续增量升级）
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 1

  # 数据源 — MySQL
  datasource:
    url: jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/${MYSQL_DATABASE:knowbrain}?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: ${MYSQL_USERNAME:root}
    password: ${MYSQL_PASSWORD:knowbrain123}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      idle-timeout: 300000
      connection-timeout: 20000

  # Redis
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:knowbrain_redis_2024}
      lettuce:
        pool:
          max-active: 16
          max-idle: 8
          min-idle: 4

  # Spring AI — LLM（OpenAI 兼容协议，默认接阿里云 DashScope）
  ai:
    openai:
      base-url: ${SPRING_AI_OPENAI_BASE_URL:https://dashscope.aliyuncs.com/compatible-mode}
      api-key: ${SPRING_AI_OPENAI_API_KEY:}
      chat:
        options:
          model: ${SPRING_AI_OPENAI_CHAT_MODEL:qwen-max}
          temperature: 0.7
      embedding:
        options:
          model: ${SPRING_AI_OPENAI_EMBEDDING_MODEL:text-embedding-v4}
          dimensions: 1024

    # Spring AI — Milvus 向量存储（关闭自动建表，改用自定义 Schema）
    vectorstore:
      milvus:
        client:
          host: ${MILVUS_HOST:localhost}
          port: ${MILVUS_GRPC_PORT:19530}
          username: ${MILVUS_USERNAME:}
          password: ${MILVUS_PASSWORD:}
        collection-name: ${MILVUS_COLLECTION:knowbrain_knowledge_base}
        index-type: IVF_FLAT
        metric-type: COSINE
        embedding-dimension: 1024
        initialize-schema: false

# Milvus 混合检索配置
milvus:
  hybrid:
    # BM25 分词器: chinese(jieba) / english / standard
    analyzer: ${MILVUS_ANALYZER:chinese}
    # RRF 融合平滑参数
    rrf-k: ${MILVUS_RRF_K:60}
    # 混合检索权重（dense:sparse）
    dense-weight: ${MILVUS_DENSE_WEIGHT:0.6}
    sparse-weight: ${MILVUS_SPARSE_WEIGHT:0.4}
    # 开发模式：重启时重建 Collection（生产环境设为 false）
    recreate-on-startup: ${MILVUS_RECREATE_ON_STARTUP:false}

# MinIO 对象存储
minio:
  endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
  access-key: ${MINIO_ACCESS_KEY:minioadmin}
  secret-key: ${MINIO_SECRET_KEY:minioadmin}
  bucket: ${MINIO_BUCKET:knowbrain-documents}

# JWT 配置
jwt:
  secret: ${JWT_SECRET:change-me-in-production}
  expire-hours: ${JWT_EXPIRE_HOURS:24}
  refresh-expire-hours: ${JWT_REFRESH_EXPIRE_HOURS:168}

# 敏感词过滤
security:
  sensitive-word:
    enabled: ${SENSITIVE_WORD_ENABLED:true}
    custom-words: ${SENSITIVE_WORD_CUSTOM:}

# MyBatis-Plus
mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  global-config:
    db-config:
      table-prefix: kb_
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  configuration:
    map-underscore-to-camel-case: true

# 场景配置（种子数据由 ScenarioDataInitializer 加载 it-helpdesk + hr-policy）

# RAG 评测配置
evaluation:
  judge:
    # 评测专用 LLM 配置（OpenAI 兼容协议）
    # 不配置时自动复用主 ChatClient（与 RAG 生成使用同一模型）
    base-url: ${EVAL_JUDGE_BASE_URL:}
    api-key: ${EVAL_JUDGE_API_KEY:}
    model: ${EVAL_JUDGE_MODEL:}

# RAG 问答配置
rag:
  agent:
    enabled: ${RAG_AGENT_ENABLED:false}
  cache:
    enabled: ${RAG_CACHE_ENABLED:true}
    ttl-minutes: ${RAG_CACHE_TTL_MINUTES:60}
  confidence:
    high-threshold: ${RAG_CONFIDENCE_HIGH:0.8}
    low-threshold: ${RAG_CONFIDENCE_LOW:0.6}

# Resilience4j 熔断器（LLM/Milvus 故障隔离）
resilience4j:
  circuitbreaker:
    instances:
      llm-chat:
        failure-rate-threshold: 50
        wait-duration-in-open-state: 30s
        sliding-window-size: 10
        minimum-number-of-calls: 5
        permitted-number-of-calls-in-half-open: 3
      milvus-search:
        failure-rate-threshold: 50
        wait-duration-in-open-state: 20s
        sliding-window-size: 10
        minimum-number-of-calls: 5
        permitted-number-of-calls-in-half-open: 3

# API 限流
rate-limit:
  rag:
    enabled: ${RATE_LIMIT_RAG_ENABLED:true}
    max-per-minute: ${RATE_LIMIT_RAG_MAX_PER_MINUTE:20}

# 企业 IM Bot 集成（企微/钉钉/飞书）
# 未配置的平台不会自动启用，不影响主服务启动
im:
  enabled: ${IM_ENABLED:false}
  wecom:
    enabled: ${WECOM_ENABLED:false}
    corp-id: ${WECOM_CORP_ID:}
    agent-id: ${WECOM_AGENT_ID:}
    secret: ${WECOM_SECRET:}
    callback-token: ${WECOM_TOKEN:}
    encoding-aes-key: ${WECOM_ENCODING_AES_KEY:}
  dingtalk:
    enabled: ${DINGTALK_ENABLED:false}
    app-key: ${DINGTALK_APP_KEY:}
    app-secret: ${DINGTALK_APP_SECRET:}
    robot-code: ${DINGTALK_ROBOT_CODE:}
  feishu:
    enabled: ${FEISHU_ENABLED:false}
    app-id: ${FEISHU_APP_ID:}
    app-secret: ${FEISHU_APP_SECRET:}

# Actuator + Prometheus 指标暴露
management:
  endpoints:
    web:
      exposure:
        include: health,prometheus
  metrics:
    export:
      prometheus:
        enabled: true

# 日志
logging:
  level:
    com.knowbrain: INFO
    org.springframework.ai: INFO
