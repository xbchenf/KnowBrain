server:
  port: 8080
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true

# CORS 跨域配置
cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}

spring:
  # 数据源 — MySQL
  datasource:
    url: jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/${MYSQL_DATABASE:knowbrain}?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: ${MYSQL_USERNAME:root}
    password: ${MYSQL_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      idle-timeout: 300000
      connection-timeout: 20000

  # Redis
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:knowbrain_redis_2024}
      lettuce:
        pool:
          max-active: 16
          max-idle: 8
          min-idle: 4

  # Spring AI — LLM（OpenAI 兼容协议，默认接阿里云 DashScope）
  ai:
    openai:
      base-url: ${SPRING_AI_OPENAI_BASE_URL:https://dashscope.aliyuncs.com/compatible-mode}
      api-key: ${SPRING_AI_OPENAI_API_KEY:}
      chat:
        options:
          model: ${SPRING_AI_OPENAI_CHAT_MODEL:qwen-max}
          temperature: 0.7
      embedding:
        options:
          model: ${SPRING_AI_OPENAI_EMBEDDING_MODEL:text-embedding-v4}
          dimensions: 1024

    # Spring AI — Milvus 向量存储（关闭自动建表，改用自定义 Schema）
    vectorstore:
      milvus:
        client:
          host: ${MILVUS_HOST:localhost}
          port: ${MILVUS_GRPC_PORT:19530}
          username: ${MILVUS_USERNAME:}
          password: ${MILVUS_PASSWORD:}
        collection-name: ${MILVUS_COLLECTION:knowbrain_knowledge_base}
        index-type: IVF_FLAT
        metric-type: COSINE
        embedding-dimension: 1024
        initialize-schema: false

# Milvus 混合检索配置
milvus:
  hybrid:
    # BM25 分词器: chinese(jieba) / english / standard
    analyzer: ${MILVUS_ANALYZER:chinese}
    # RRF 融合平滑参数
    rrf-k: ${MILVUS_RRF_K:60}
    # 混合检索权重（dense:sparse）
    dense-weight: ${MILVUS_DENSE_WEIGHT:0.6}
    sparse-weight: ${MILVUS_SPARSE_WEIGHT:0.4}
    # 开发模式：重启时重建 Collection（生产环境设为 false）
    recreate-on-startup: ${MILVUS_RECREATE_ON_STARTUP:false}

# MinIO 对象存储
minio:
  endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
  access-key: ${MINIO_ACCESS_KEY:minioadmin}
  secret-key: ${MINIO_SECRET_KEY:minioadmin}
  bucket: ${MINIO_BUCKET:knowbrain-documents}

# JWT 配置
jwt:
  secret: ${JWT_SECRET:knowbrain_jwt_secret_2024}
  expire-hours: ${JWT_EXPIRE_HOURS:24}

# 敏感词过滤
security:
  sensitive-word:
    enabled: ${SENSITIVE_WORD_ENABLED:true}
    custom-words: ${SENSITIVE_WORD_CUSTOM:}

# MyBatis-Plus
mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  global-config:
    db-config:
      table-prefix: kb_
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

# 场景配置
# 场景配置（种子数据路径，仅首次启动导入 DB 时使用）
scenario:
  seed-path: ${SCENARIO_SEED_PATH:classpath:scenarios/it-helpdesk}

# RAG 问答缓存
rag:
  cache:
    enabled: ${RAG_CACHE_ENABLED:true}
    ttl-minutes: ${RAG_CACHE_TTL_MINUTES:60}

# 日志
logging:
  level:
    com.knowbrain: DEBUG
    org.springframework.ai: DEBUG
