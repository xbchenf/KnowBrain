# ============================================================
# 本地开发环境配置
# 激活方式: mvnw spring-boot:run（默认 dev profile）
# ============================================================

# MyBatis-Plus SQL 日志（开发时输出 SQL 便于调试）
mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

# 日志（开发时开启 DEBUG）
logging:
  level:
    com.knowbrain: DEBUG
    org.springframework.ai: DEBUG
    org.springframework.security: DEBUG
    org.springframework.security.oauth2: TRACE

# Agent 检索智能体（开发环境默认开启）
rag:
  agent:
    enabled: true

# ============================================================
# OAuth2/OIDC 企业 SSO
# ============================================================
spring:
  security:
    oauth2:
      client:
        registration:
          feishu:
            client-id: ${FEISHU_APP_ID}
            client-secret: ${FEISHU_APP_SECRET}
            authorization-grant-type: authorization_code
            client-authentication-method: client_secret_post
            redirect-uri: 'http://localhost/login/oauth2/code/feishu'
            scope:
            client-name: 飞书
          dingtalk:
            client-id: ${DINGTALK_H5_APP_CLIENT_ID}
            client-secret: ${DINGTALK_H5_APP_CLIENT_SECRET}
            authorization-grant-type: authorization_code
            client-authentication-method: client_secret_post
            redirect-uri: 'http://localhost/login/oauth2/code/dingtalk'
            scope:
            client-name: 钉钉
        provider:
          feishu:
            authorization-uri: https://open.feishu.cn/open-apis/authen/v1/authorize
            token-uri: https://accounts.feishu.cn/oauth/v3/token
            user-info-uri: https://open.feishu.cn/open-apis/authen/v1/user_info
            userNameAttribute: sub
          dingtalk:
            authorization-uri: https://login.dingtalk.com/oauth2/auth
            token-uri: https://api.dingtalk.com/v1.0/oauth2/userAccessToken
            user-info-uri: https://api.dingtalk.com/v1.0/contact/users/me
            userNameAttribute: openId