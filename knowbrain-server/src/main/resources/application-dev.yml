# ============================================================
# 本地开发环境配置
# 激活方式: mvnw spring-boot:run（默认 dev profile）
# ============================================================

# MyBatis-Plus SQL 日志（开发时输出 SQL 便于调试）
mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

# 日志（开发时开启 DEBUG）
logging:
  level:
    com.knowbrain: DEBUG
    org.springframework.ai: DEBUG

# Agent 检索智能体（开发环境默认开启）
rag:
  agent:
    enabled: true

# ============================================================
# OAuth2/OIDC 企业 SSO
# 测试飞书登录前，需要在飞书开放平台：
#   → 你的应用 → 安全设置 → 添加回调域名: http://localhost:8080
#   → 权限管理 → 开通「获取用户信息」(contact:user.base:readonly)
# ============================================================
spring:
  security:
    oauth2:
      client:
        registration:
          feishu:
            client-id: ${FEISHU_APP_ID}
            client-secret: ${FEISHU_APP_SECRET}
            authorization-grant-type: authorization_code
            client-authentication-method: client_secret_post
            redirect-uri: 'http://localhost/login/oauth2/code/feishu'
            scope:
            client-name: 飞书
        provider:
          feishu:
            authorization-uri: https://open.feishu.cn/open-apis/authen/v1/authorize
            token-uri: https://open.feishu.cn/open-apis/authen/v1/oidc/access_token
            user-info-uri: https://open.feishu.cn/open-apis/authen/v1/user_info
            userNameAttribute: sub