# ============================================================
# 本地开发环境配置
# 激活方式: mvnw spring-boot:run（默认 dev profile）
# ============================================================

# MyBatis-Plus SQL 日志（开发时输出 SQL 便于调试）
mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

# 日志（开发时开启 DEBUG）
logging:
  level:
    com.knowbrain: DEBUG
    org.springframework.ai: DEBUG

# Agent 检索智能体（开发环境默认开启）
rag:
  agent:
    enabled: true