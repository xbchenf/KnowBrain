name: E2E Smoke (PR)

on:
  pull_request:
    paths:
      - 'knowbrain-server/**'
      - 'knowbrain-web/**'
      - 'docker-compose.yml'
      - '.github/workflows/**'
  workflow_dispatch:

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    env:
      COMPOSE_PROJECT_NAME: kb-pr-${{ github.event.pull_request.number || 'manual' }}

    steps:
      - uses: actions/checkout@v4

      # ---- Java: Maven 构建 JAR ----
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build server JAR
        run: mvn package -DskipTests -q --no-transfer-progress
        working-directory: knowbrain-server

      # ---- Node.js: E2E 依赖 ----
      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: knowbrain-web/e2e/package-lock.json

      - name: Install E2E dependencies
        run: npm ci
        working-directory: knowbrain-web/e2e

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium
        working-directory: knowbrain-web/e2e

      # ---- Docker Compose: 启动全栈 ----
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Start KnowBrain services
        run: |
          cat > .env << 'ENVEOF'
          SPRING_AI_OPENAI_API_KEY=${{ secrets.DASHSCOPE_API_KEY }}
          JWT_SECRET=ci-test-jwt-not-for-production
          MYSQL_ROOT_PASSWORD=ci-test-mysql
          REDIS_PASSWORD=ci-test-redis
          MINIO_ACCESS_KEY=ci-minio-admin
          MINIO_SECRET_KEY=ci-minio-key
          MILVUS_RECREATE_ON_STARTUP=true
          ENVEOF
          docker compose up -d --build

      - name: Wait for server health
        run: |
          echo "Waiting for KnowBrain server to be ready..."
          for i in $(seq 1 36); do
            STATUS=$(curl -s -o /dev/null -w '%{http_code}' http://localhost/api/v1/health 2>/dev/null || echo '000')
            if [ "$STATUS" = "200" ]; then
              echo "✅ Server ready (HTTP $STATUS) after ${i}0s"
              exit 0
            fi
            echo "⏳ attempt $i/36 — HTTP $STATUS, waiting 10s..."
            sleep 10
          done
          echo "❌ Server failed to start within 6 minutes"
          echo "=== docker compose ps ==="
          docker compose ps
          echo "=== server logs (last 60 lines) ==="
          docker compose logs --tail=60 server || true
          exit 1

      # ---- E2E: Smoke 测试 ----
      - name: Run smoke tests
        run: npx playwright test --project=chromium --grep @smoke
        working-directory: knowbrain-web/e2e
        env:
          BASE_URL: http://localhost

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-smoke-report-${{ github.event.pull_request.number || 'manual' }}
          path: knowbrain-web/e2e/playwright-report/
          retention-days: 7

      - name: Upload test results (JUnit)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-smoke-results-${{ github.event.pull_request.number || 'manual' }}
          path: knowbrain-web/e2e/test-results/
          retention-days: 7

      # ---- 清理 ----
      - name: Cleanup
        if: always()
        run: docker compose down -v --remove-orphans
