name: E2E Full Suite (Merge)

on:
  push:
    branches: [main]
    paths:
      - 'knowbrain-server/**'
      - 'knowbrain-web/**'
      - 'docker-compose.yml'
      - '.github/workflows/**'
  workflow_dispatch:

permissions:
  contents: read
  id-token: write
  pages: write

jobs:
  full-suite:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      COMPOSE_PROJECT_NAME: kb-merge

    steps:
      - uses: actions/checkout@v4

      # ---- Java: Maven 构建 JAR ----
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build server JAR
        run: mvn package -Dmaven.test.skip=true -q --no-transfer-progress
        working-directory: knowbrain-server

      # ---- Node.js: E2E 依赖 ----
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: knowbrain-web/e2e/package-lock.json

      - name: Install E2E dependencies
        run: npm ci
        working-directory: knowbrain-web/e2e

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
        working-directory: knowbrain-web/e2e

      # ---- Docker Compose ----
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Start KnowBrain services
        run: |
          cat > .env << 'ENVEOF'
          SPRING_AI_OPENAI_API_KEY=${{ secrets.DASHSCOPE_API_KEY }}
          JWT_SECRET=ci-merge-jwt-not-for-production
          MYSQL_ROOT_PASSWORD=ci-merge-mysql
          REDIS_PASSWORD=ci-merge-redis
          MINIO_ACCESS_KEY=ci-merge-minio
          MINIO_SECRET_KEY=ci-merge-minio-key
          MILVUS_RECREATE_ON_STARTUP=true
          ENVEOF
          docker compose up -d --build 2>&1
          echo "=== container status ==="
          docker compose ps

      - name: Wait for server health
        run: |
          echo "Waiting for KnowBrain server..."
          for i in $(seq 1 48); do
            STATUS=$(curl -s -o /dev/null -w '%{http_code}' http://localhost/api/v1/health 2>/dev/null || echo '000')
            if [ "$STATUS" = "200" ]; then
              echo "✅ Server ready (HTTP $STATUS) after ${i}0s"
              exit 0
            fi
            # 每 6 次（1 分钟）输出一次容器状态
            if [ $((i % 6)) -eq 0 ]; then
              echo "--- minute $((i/6)): container status ---"
              docker compose ps --format 'table {{.Name}} {{.Status}}' 2>/dev/null || true
            fi
            echo "⏳ attempt $i/48 — HTTP $STATUS, waiting 10s..."
            sleep 10
          done
          echo "❌ Server failed to start within 8 minutes"
          echo "=== full ps ==="
          docker compose ps
          echo "=== server logs ==="
          docker compose logs --tail=100 server || true
          echo "=== milvus logs ==="
          docker compose logs --tail=30 milvus || true
          exit 1

      # ---- E2E: 全量测试 ----
      - name: Run full E2E suite
        id: e2e
        run: npx playwright test
        working-directory: knowbrain-web/e2e
        env:
          BASE_URL: http://localhost

      - name: Upload Playwright HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-full-report-merge
          path: knowbrain-web/e2e/playwright-report/
          retention-days: 90
          if-no-files-found: ignore

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-full-results-merge
          path: knowbrain-web/e2e/test-results/
          retention-days: 90
          if-no-files-found: ignore

      # ---- GitHub Pages 部署（仅当报告存在时） ----
      - name: Setup Pages
        if: always() && steps.e2e.outcome != 'skipped'
        uses: actions/configure-pages@v4

      - name: Check report exists
        id: check-report
        if: always() && steps.e2e.outcome != 'skipped'
        run: |
          if [ -f knowbrain-web/e2e/playwright-report/index.html ]; then
            echo "has_report=true" >> $GITHUB_OUTPUT
          else
            echo "has_report=false" >> $GITHUB_OUTPUT
            echo "⚠️ No report generated — skipping Pages deployment"
          fi

      - name: Upload to Pages
        if: steps.check-report.outputs.has_report == 'true'
        uses: actions/upload-pages-artifact@v3
        with:
          path: knowbrain-web/e2e/playwright-report/

      - name: Deploy to GitHub Pages
        if: steps.check-report.outputs.has_report == 'true'
        uses: actions/deploy-pages@v4

      # ---- 清理 ----
      - name: Cleanup
        if: always()
        run: docker compose down -v --remove-orphans
